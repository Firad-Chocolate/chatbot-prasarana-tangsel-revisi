# Konfigurasi Nginx reverse proxy untuk Rasa server.
# Ganti "chatbot.domainkamu.com" dengan domain/subdomain asli kamu.
# Simpan file ini di VPS sebagai /etc/nginx/sites-available/chatbot-rasa

server {
    listen 80;
    server_name chatbot.domainkamu.com;

    location / {
        proxy_pass http://127.0.0.1:5005;
        proxy_http_version 1.1;

        # Wajib untuk socketio (websocket)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 90s;
    }
}
